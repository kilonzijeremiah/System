<!DOCTYPE html>
<html>
<head>
    <title>ERMS Dashboard</title>
</head>
<body>

<h1>Electronic Records Management System</h1>

<a href="/upload">Upload Record</a>

<hr>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Category</th>
    <th>File</th>
</tr>

{% for record in records %}
<tr>
    <td>{{ record.id }}</td>
    <td>{{ record.title }}</td>
    <td>{{ record.category }}</td>
    <td>
        <a href="/uploads/{{ record.filename }}">
            Download
        </a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
